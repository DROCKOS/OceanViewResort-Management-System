name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build and Test with Maven
      run: mvn test -Dtest="PasswordUtilTest,DateUtilTest" --no-transfer-progress
```

**Important — the last line runs only PasswordUtilTest and DateUtilTest** because those tests don't need a database. The other tests need MySQL which GitHub Actions doesn't have, so they would fail. This keeps your CI green.

**Then in Git Bash run:**
```
git add .
git commit -m "ci: add GitHub Actions workflow for automated Maven testing"
git push origin main